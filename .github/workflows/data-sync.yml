name: data-sync

on:
  schedule:
    # JST 4〜23時に毎時0分実行（UTC 19〜14時）
    # JST 4〜8時 = UTC 19〜23時
    - cron: "0 19-23 * * *"
    # JST 9〜23時 = UTC 0〜14時
    - cron: "0 0-14 * * *"
  workflow_dispatch:
    inputs:
      force_sleep:
        description: "睡眠レポートを時間外でも強制送信する (true/false)"
        required: false
        default: "false"
      force_weight:
        description: "weight_sent フラグを無視して体重データを強制再取得する (true/false)"
        required: false
        default: "false"
  repository_dispatch:
    types: [data_sync_trigger]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data-sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
          FORCE_SLEEP: ${{ github.event.inputs.force_sleep || github.event.client_payload.force_sleep }}
          FORCE_WEIGHT: ${{ github.event.inputs.force_weight || github.event.client_payload.force_weight }}
        run: python -m src.data_sync

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-data-sync-${{ github.run_id }}
          path: app.log
          retention-days: 7
