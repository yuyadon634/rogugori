name: data-sync

on:
  schedule:
    # JST 4〜11時に毎時0分実行（UTC 19〜02時）
    - cron: "0 19-23 * * *"
    - cron: "0 0-2 * * *"
  workflow_dispatch:
    inputs:
      force_sleep:
        description: "睡眠レポートを時間外でも強制送信する (true/false)"
        required: false
        default: "false"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data-sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_FIT_CREDENTIALS_JSON: ${{ secrets.GOOGLE_FIT_CREDENTIALS_JSON }}
          GOOGLE_FIT_TOKEN_JSON: ${{ secrets.GOOGLE_FIT_TOKEN_JSON }}
          FORCE_SLEEP: ${{ github.event.inputs.force_sleep }}
        run: python -m src.data_sync

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-data-sync-${{ github.run_id }}
          path: app.log
          retention-days: 7
