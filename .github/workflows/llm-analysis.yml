name: llm-analysis

on:
  schedule:
    # 毎日 22:00 JST = 13:00 UTC
    - cron: "0 13 * * *"
  repository_dispatch:
    # Render.com の Webhook サーバーから手動トリガー
    types: [llm_analysis_trigger]
  workflow_dispatch: # 手動実行用（テスト・デバッグ）

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run llm-analysis
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # LINE ボタン押下時は force=true が渡され、llm_sent フラグを無視して再分析する
          FORCE_ANALYSIS: ${{ github.event.client_payload.force || 'false' }}
        run: python -m src.analysis

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-llm-analysis-${{ github.run_id }}
          path: app.log
          retention-days: 7
