name: llm-analysis

on:
  schedule:
    # 毎日 22:00 JST = 13:00 UTC
    - cron: "0 13 * * *"
  repository_dispatch:
    # Render.com の Webhook サーバーから手動トリガー
    types: [llm_analysis_trigger]
  workflow_dispatch: # 手動実行用（テスト・デバッグ）

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run llm-analysis
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # LINE ボタン押下時は force=true が渡され、llm_sent フラグを無視して再分析する
          FORCE_ANALYSIS: ${{ github.event.client_payload.force || 'false' }}
        run: python -m src.analysis

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"$LINE_USER_ID\",\"messages\":[{\"type\":\"text\",\"text\":\"⚠️ 分析ワークフローでエラーが発生したウホ…\n\nGitHub Actions のログを確認してウホ🦍\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}"

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log-llm-analysis-${{ github.run_id }}
          path: app.log
          retention-days: 7
